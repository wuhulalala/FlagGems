---
name: Backend Test

on:
  workflow_call:
    inputs:
      vendor:
        description: 'GEMS_VENDOR value (e.g. iluvatar, ascend, moore)'
        required: true
        type: string
      runner_label:
        description: 'GitHub Actions runner label'
        required: true
        type: string
      gpu_check_script:
        description: 'Path to GPU check script (leave empty to skip)'
        required: false
        type: string
        default: ''
      test_script:
        description: 'Path to test script under tools/'
        required: true
        type: string
      changed_files:
        description: 'List of changed files in a PR'
        required: false
        type: string
        default: ''
    secrets:
      RUNNER_SSH_KEY:
        required: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ inputs.runner_label }}
    concurrency:
      group: >-
        op-test-${{ inputs.vendor }}-
        ${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.RUNNER_SSH_KEY }}
      - name: Check GPU availability
        if: ${{ inputs.gpu_check_script != '' }}
        shell: bash
        run: |
          bash ${{ inputs.gpu_check_script }}
      - name: Run backend tests
        env:
          CHANGED_FILES: ${{ inputs.changed_files }}
        shell: bash
        run: |
          bash ${{ inputs.test_script }} ${{ inputs.vendor }}
